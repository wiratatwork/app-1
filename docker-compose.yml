services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app1-api
    environment:
      ASPNETCORE_URLS: http://+:5002
      Keycloak__BaseUrl: http://host.docker.internal:7890
      Keycloak__PublicBaseUrl: http://localhost:7890
      Keycloak__Realm: toyota
      Keycloak__ClientId: app-1
      Keycloak__RequireHttpsMetadata: "false"
      Bff__PublicBaseUrl: http://localhost:4201
      Bff__SessionIdleMinutes: "30"
      Bff__EnableSilentSso: "true"
      Cors__AllowedOrigins__0: http://localhost:4201
    ports:
      - "5002:5002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app1-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app1-frontend
    ports:
      - "4201:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app1-network

networks:
  app1-network:
    driver: bridge
