services:
  postgres:
    image: postgres:16-alpine
    container_name: app1-postgres
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: demo
    ports:
      - "5434:5432"
    volumes:
      - app1_postgres_data:/var/lib/postgresql/data
    networks:
      - app1-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app1-api
    environment:
      ASPNETCORE_URLS: http://+:5002
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
      Bff__TokenEncryption__Key: ${BFF_TOKEN_ENCRYPTION_KEY}
      Keycloak__BaseUrl: http://host.docker.internal:7890
      Keycloak__PublicBaseUrl: http://localhost:7890
      Keycloak__Realm: toyota
      Keycloak__ClientId: app-1
      Keycloak__RequireHttpsMetadata: "false"
      Bff__PublicBaseUrl: http://localhost:4201
      Bff__SessionIdleMinutes: "30"
      Bff__EnableSilentSso: "true"
      Cors__AllowedOrigins__0: http://localhost:4201
    ports:
      - "5002:5002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app1-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: app1-frontend
    ports:
      - "4201:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app1-network

volumes:
  app1_postgres_data:

networks:
  app1-network:
    driver: bridge
